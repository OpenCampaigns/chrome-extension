<!DOCTYPE html>
<html>

<head>
    <title>OpenCampaigns Configuration</title>
    <style>
        body {
            font-family: system-ui, sans-serif;
            width: 320px;
            padding: 16px;
            margin: 0;
            color: #333;
        }

        h2 {
            margin-top: 0;
            font-size: 1.2rem;
            color: #1e293b;
        }

        .form-group {
            margin-bottom: 12px;
        }

        label {
            display: block;
            font-weight: 500;
            font-size: 0.9rem;
            margin-bottom: 4px;
        }

        input[type="text"] {
            width: 100%;
            border: 1px solid #cbd5e1;
            border-radius: 4px;
            padding: 6px;
            box-sizing: border-box;
        }

        .checkbox-label {
            display: flex;
            align-items: center;
            font-weight: 400;
            gap: 6px;
        }

        button {
            background: #3b82f6;
            color: white;
            border: none;
            padding: 8px 16px;
            border-radius: 4px;
            cursor: pointer;
            width: 100%;
            font-weight: 600;
            margin-top: 8px;
        }

        button:hover {
            background: #2563eb;
        }

        .footer {
            font-size: 0.75rem;
            color: #94a3b8;
            text-align: center;
            margin-top: 16px;
        }
    </style>
</head>

<body>
    <h2>Intent Settings</h2>
    <p style="font-size: 0.85rem; color: #64748b; margin-top: 0;">Tell the network what you are interested in. Ad
        components will autonomously map to these interests.</p>

    <div class="form-group">
        <label for="themes">Follow Themes (comma separated)</label>
        <input type="text" id="themes" placeholder="e.g. software, outdoors, fitness">
    </div>

    <div class="form-group">
        <label class="checkbox-label">
            <input type="checkbox" id="blockNsfw">
            Strictly Block unsafe/adult/harmful/sensitive content
        </label>
    </div>

    <button id="saveBtn">Save Intents</button>
    <div id="status" style="display:none; color: green; font-size: 0.8rem; text-align: center; margin-top: 8px;">Saved
        successfully!</div>

    <div class="footer">
        OpenCampaigns — The Ad Network Replacement
    </div>

    <script type="module" src="popup.js"></script>
</body>

</html>
